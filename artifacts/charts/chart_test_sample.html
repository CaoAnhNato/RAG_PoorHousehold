<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Biểu đồ Hộ Nghèo 2024</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .chart-container { width: 100%; max-width: 800px; height: 500px; background-color: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <h2>Thống kê chuyên sâu Hộ Nghèo theo phân loại 2024</h2>
    <div id="chart" class="chart-container"></div>
    <script>
        var data = [{
            x: ['Thiếu hụt việc làm', 'Thiếu hụt y tế', 'Thiếu hụt giáo dục', 'Thiếu hụt nhà ở', 'Thiếu hụt nước sạch', 'Thiếu hụt vệ sinh', 'Thiếu hụt thông tin'],
            y: [120, 95, 80, 150, 45, 60, 110],
            type: 'bar',
            marker: { color: '#3b82f6' }
        }];
        var layout = {
            title: { text: 'Số lượng hộ thiếu hụt theo chỉ số', font: { color: '#ffffff', size: 18 } },
            paper_bgcolor: '#1e1e1e',
            plot_bgcolor: '#1e1e1e',
            font: { color: '#e0e0e0' },
            xaxis: { title: 'Chỉ số thiếu hụt', tickangle: 0 }, // Cố tình để tickangle=0 để test kiểm tra overlap
            yaxis: { title: 'Số hộ' },
            margin: { t: 60, l: 60, r: 40, b: 80 }
        };
        Plotly.newPlot('chart', data, layout);
    </script>
</body>
</html>
